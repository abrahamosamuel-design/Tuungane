<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — Tuungane</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
      }
      img { width: 88px; height: 88px; margin-bottom: 16px; }
      h1 { font-size: 22px; margin: 0 0 8px; color: #1e3a8a; }
      p { font-size: 15px; line-height: 1.5; color: #475569; margin: 0 0 20px; }
      button {
        appearance: none;
        border: 0;
        background: #1e3a8a;
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon-192.png" alt="Tuungane" />
      <h1>You're offline</h1>
      <p>You're offline. Some Tuungane features may be unavailable. Please reconnect to continue.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
